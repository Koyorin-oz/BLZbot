# Déploie le code sur PebbleHost (SFTP) à chaque push sur main.
# Le .env reste sur le serveur (non versionné) — il n’est pas écrasé.
#
# Active le déploiement : GitHub → Settings → Secrets and variables → Actions
#   - Variable (onglet Variables) : PEBBLE_DEPLOY = 1
#   - Secrets (onglet Secrets) : voir doc/DEPLOY-PEBBLE.md
#
name: Deploy PebbleHost (SFTP)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-pebble
  cancel-in-progress: true

jobs:
  deploy:
    name: Sync fichiers vers Pebble (SFTP)
    runs-on: ubuntu-latest
    # Définis la variable repo PEBBLE_DEPLOY=1 quand les secrets SFTP sont configurés
    if: vars.PEBBLE_DEPLOY == '1'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Préparer le dossier à envoyer (sans .git / node_modules / bruit)
        run: |
          mkdir -p _deploy_out
          rsync -a \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='modération/node_modules' \
            --exclude='niveau/node_modules' \
            --exclude='.github' \
            --exclude='_deploy_out' \
            --exclude='*.log' \
            ./ _deploy_out/

      - name: Port SFTP (défaut 22 si secret vide)
        id: sftp_port
        run: |
          P="${{ secrets.PEBBLE_SFTP_PORT }}"
          if [ -z "$P" ]; then P="22"; fi
          echo "port=$P" >> "$GITHUB_OUTPUT"

      # SFTP uniquement (pas de « ssh mkdir ») : compatible PebbleHost port 2222.
      - name: Déployer en SFTP (lftp mirror)
        env:
          LFTP_PASSWORD: ${{ secrets.PEBBLE_SFTP_PASSWORD }}
          SFTP_HOST: ${{ secrets.PEBBLE_SFTP_HOST }}
          SFTP_USER: ${{ secrets.PEBBLE_SFTP_USERNAME }}
          REMOTE_PATH: ${{ secrets.PEBBLE_REMOTE_PATH }}
          SFTP_PORT: ${{ steps.sftp_port.outputs.port }}
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y -qq lftp
          if [ -z "${SFTP_HOST:-}" ] || [ -z "${SFTP_USER:-}" ] || [ -z "${LFTP_PASSWORD:-}" ] || [ -z "${REMOTE_PATH:-}" ]; then
            echo "::error::Secret(s) manquant(s) : PEBBLE_SFTP_HOST, USERNAME, PASSWORD ou REMOTE_PATH."
            exit 1
          fi
          lftp -c "
          set sftp:auto-confirm yes
          set net:timeout 60
          set net:max-retries 3
          open -u \"${SFTP_USER}\",\"${LFTP_PASSWORD}\" sftp://${SFTP_HOST}:${SFTP_PORT}
          mirror -R --parallel=3 \"${GITHUB_WORKSPACE}/_deploy_out\" \"${REMOTE_PATH}\"
          bye
          "
          echo "Déploiement SFTP terminé."
